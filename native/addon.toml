abi = 1
entry = "taida_addon_get_v1"
package = "taida-lang/terminal"
library = "taida_lang_terminal"

[functions]
terminalSize = 0
readKey = 0
isTerminal = 1
rawModeEnter = 0
rawModeLeave = 0
readEvent = 0
write = 1
# Phase 8 / TMB-020 — renderer native migration (append-only)
bufferPut = 4
bufferWrite = 5
bufferFillRect = 6
bufferClear = 2
bufferDiff = 2
renderFull = 1
renderFrame = 2
renderOps = 1
# Phase 9 / TMB-022 — sub-buffer blit (append-only)
bufferBlit = 4

[library.prebuild]
url = "https://github.com/taida-lang/terminal/releases/download/{version}/lib{name}-{target}.{ext}"
# SHA-256 digests live in `addon.lock.toml` (CI-generated, attached to
# each GitHub Release). `taida install` falls back to fetching that
# file when `[library.prebuild.targets]` is absent or missing the
# host triple.
