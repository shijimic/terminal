# Taida Lang terminal addon -- prebuild release workflow
#
# Builds the cdylib for 5 baseline targets on every Taida-versioned tag
# (e.g. `a.1`, `a.3`, `b.1.rc`) and uploads the binaries + SHA-256
# hashes to the corresponding GitHub Release.
#
# Based on addon-prebuild-template.yml from taida-lang/taida.

name: Prebuild Release

on:
  push:
    tags:
      # Taida version tags: generation.number or generation.number.label
      # Examples: a.1, a.3, b.1.rc, aa.12.beta
      - "[a-z].[0-9]*"
      - "[a-z][a-z].[0-9]*"

permissions:
  contents: write  # upload release assets

env:
  LIBRARY_STEM: taida_lang_terminal
  CRATE_DIR: .

jobs:
  build:
    name: build ${{ matrix.triple }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: so
            prefix: lib
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: so
            prefix: lib
            cross: true
          - triple: x86_64-apple-darwin
            runner: macos-latest
            ext: dylib
            prefix: lib
          - triple: aarch64-apple-darwin
            runner: macos-latest
            ext: dylib
            prefix: lib
          - triple: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: dll
            prefix: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install cross (for non-native targets)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build cdylib (native)
        if: "!matrix.cross"
        run: |
          cd "${{ env.CRATE_DIR }}"
          cargo build --release --target ${{ matrix.triple }}

      - name: Build cdylib (cross)
        if: matrix.cross
        run: |
          cd "${{ env.CRATE_DIR }}"
          cross build --release --target ${{ matrix.triple }}

      - name: Pack and hash
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          src="target/${{ matrix.triple }}/release/${{ matrix.prefix }}${{ env.LIBRARY_STEM }}.${{ matrix.ext }}"
          if [ ! -f "$src" ]; then
            echo "expected artifact $src not found" >&2
            ls -l "target/${{ matrix.triple }}/release/" || true
            exit 1
          fi
          dst="${{ matrix.prefix }}${{ env.LIBRARY_STEM }}-${{ matrix.triple }}.${{ matrix.ext }}"
          cp "$src" "$dst"
          if command -v sha256sum >/dev/null; then
            sha=$(sha256sum "$dst" | awk '{print $1}')
          else
            sha=$(shasum -a 256 "$dst" | awk '{print $1}')
          fi
          echo "artifact=$dst" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          printf '"%s" = "sha256:%s"\n' "${{ matrix.triple }}" "$sha" > "${{ matrix.triple }}.toml.fragment"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.triple }}
          path: |
            ${{ steps.pack.outputs.artifact }}
            ${{ matrix.triple }}.toml.fragment

  release:
    name: attach to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: prebuild-artifacts

      - name: Assemble manifest fragment
        run: |
          set -e
          echo "[library.prebuild.targets]" > prebuild-targets.toml.txt
          find prebuild-artifacts -name "*.toml.fragment" -print0 \
            | xargs -0 cat >> prebuild-targets.toml.txt
          cat prebuild-targets.toml.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            prebuild-artifacts/**/lib*.so
            prebuild-artifacts/**/lib*.dylib
            prebuild-artifacts/**/*.dll
            prebuild-targets.toml.txt
          fail_on_unmatched_files: false
